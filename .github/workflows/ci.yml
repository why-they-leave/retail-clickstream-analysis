name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          # GIS 패키지(geopandas 등)는 GDAL 시스템 라이브러리 필요 → CI에서는 제외
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: 테스트 실행
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
